name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e
            if [ ! -d /var/www/harness/.git ]; then
                mkdir -p /var/www
                git clone https://github.com/anc1bu/harness.git /var/www/harness
            fi
            cd /var/www/harness
            git fetch --all
            git reset --hard origin/main
            chmod +x deploy/provision.sh
            ./deploy/provision.sh
