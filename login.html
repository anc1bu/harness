<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harness — Sign in</title>
  <style>
    :root {
      --bg:        #0a1628;
      --panel:     #111f38;
      --border:    #1f3a5a;
      --accent:    #4ade80;
      --accent2:   #86efac;
      --danger:    #e06060;
      --text:      #b8d8c2;
      --text-dim:  #5c8a6d;
      --glow:      0 0 10px rgba(74,222,128,0.28);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 1000;
    }
    .auth-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 32px 28px;
      width: 340px;
      box-shadow: var(--glow);
    }
    .logo {
      font-size: 20px; font-weight: bold; letter-spacing: 4px;
      color: var(--accent); text-shadow: var(--glow);
      text-align: center; margin-bottom: 4px;
    }
    .logo span { color: var(--accent2); }
    .sub {
      text-align: center; font-size: 10px; letter-spacing: 2px;
      color: var(--text-dim); text-transform: uppercase; margin-bottom: 24px;
    }
    .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 10px; text-align: center; cursor: pointer;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim); transition: all .2s; border-bottom: 2px solid transparent;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 9px; letter-spacing: 2px;
      color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: 4px;
      font-family: inherit; font-size: 12px; outline: none;
    }
    .field input:focus { border-color: var(--accent); }
    .btn {
      display: block; width: 100%; padding: 11px;
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); font-family: inherit;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; border-radius: 4px; transition: all .2s; margin-top: 10px;
    }
    .btn:hover { background: rgba(74,222,128,0.10); box-shadow: var(--glow); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .msg {
      font-size: 10px; text-align: center; margin-top: 14px;
      min-height: 14px; letter-spacing: 1px;
    }
    .msg.err { color: var(--danger); }
    .msg.ok { color: var(--accent2); }
    .ctrl-label {
      font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 8px; margin-top: 16px;
    }
    .ctrl-label:first-child { margin-top: 0; }
    .proj-item {
      padding: 9px 12px; border: 1px solid var(--border); border-radius: 4px;
      margin-bottom: 6px; cursor: pointer; font-size: 12px; transition: all .2s;
    }
    .proj-item:hover { border-color: var(--accent); color: var(--accent); background: rgba(74,222,128,0.06); }
    .divider {
      border: none; border-top: 1px solid var(--border); margin: 18px 0;
    }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="logo">HARNESS <span>//</span> SAPCONS</div>

    <!-- Step 1: Credentials -->
    <div id="creds-panel">
      <div class="sub">Access Terminal</div>
      <div class="tabs">
        <div class="tab active" data-mode="login">Sign In</div>
        <div class="tab" data-mode="signup">Sign Up</div>
      </div>
      <form id="form" autocomplete="off">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn" id="btn">▶ Sign In</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>

    <!-- Step 2: Project selection (hidden until credentials pass) -->
    <div id="proj-panel" style="display:none">
      <div class="sub">Select Project</div>
      <div id="select-section">
        <div class="ctrl-label">Existing Projects</div>
        <div id="proj-list"></div>
        <hr class="divider">
      </div>
      <div class="ctrl-label">New Project</div>
      <div class="field">
        <label for="new-proj-input">Project Name</label>
        <input type="text" id="new-proj-input" maxlength="64" placeholder="e.g. Client Alpha" />
      </div>
      <button type="button" class="btn" id="btn-create-proj">▶ Create &amp; Enter</button>
      <div class="msg" id="proj-msg"></div>
    </div>
  </div>

<script>
let mode = 'login';
const tabs = document.querySelectorAll('.tab');
const btn = document.getElementById('btn');
const msg = document.getElementById('msg');
const pw = document.getElementById('password');

tabs.forEach(t => t.addEventListener('click', () => {
  tabs.forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  mode = t.dataset.mode;
  btn.textContent = mode === 'login' ? '▶ Sign In' : '▶ Create Account';
  pw.autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  msg.textContent = ''; msg.className = 'msg';
}));

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  btn.disabled = true; msg.textContent = ''; msg.className = 'msg';
  const email = document.getElementById('email').value.trim();
  const password = pw.value;
  const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/signup';
  try {
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) {
      const errMap = {
        bad_credentials: 'Invalid email or password',
        email_exists: 'That email is already registered',
        password_too_short: 'Password must be at least 6 characters',
        invalid_email: 'Invalid email address'
      };
      msg.textContent = errMap[data.error] || data.error || 'Error';
      msg.className = 'msg err';
    } else {
      msg.textContent = mode === 'login' ? 'welcome back' : 'account created';
      msg.className = 'msg ok';
      const pr = await fetch('/api/projects');
      const pd = await pr.json();
      setTimeout(() => showProjectStep(pd.projects), 400);
    }
  } catch (err) {
    msg.textContent = 'Network error';
    msg.className = 'msg err';
  } finally {
    btn.disabled = false;
  }
});

function showProjectStep(projects) {
  document.getElementById('creds-panel').style.display = 'none';
  const panel = document.getElementById('proj-panel');
  panel.style.display = '';
  const selectSection = document.getElementById('select-section');
  const projList = document.getElementById('proj-list');
  if (!projects || !projects.length) {
    selectSection.style.display = 'none';
  } else {
    selectSection.style.display = '';
    projList.innerHTML = projects.map(p =>
      `<div class="proj-item" data-p="${p.replace(/"/g, '&quot;')}">${p}</div>`
    ).join('');
    projList.querySelectorAll('.proj-item').forEach(el =>
      el.addEventListener('click', () => selectProject(el.dataset.p))
    );
  }
  document.getElementById('new-proj-input').focus();
}

async function selectProject(name) {
  const projMsg = document.getElementById('proj-msg');
  projMsg.textContent = ''; projMsg.className = 'msg';
  try {
    const r = await fetch('/api/auth/set-project', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: name })
    });
    const d = await r.json();
    if (r.ok) {
      window.location.href = '/';
    } else {
      projMsg.textContent = d.hint || d.error || 'Error';
      projMsg.className = 'msg err';
    }
  } catch (err) {
    projMsg.textContent = 'Network error';
    projMsg.className = 'msg err';
  }
}

document.getElementById('btn-create-proj').addEventListener('click', async () => {
  const name = document.getElementById('new-proj-input').value.trim();
  const projMsg = document.getElementById('proj-msg');
  projMsg.textContent = ''; projMsg.className = 'msg';
  if (!name) { projMsg.textContent = 'Enter a project name'; projMsg.className = 'msg err'; return; }
  try {
    const r = await fetch('/api/auth/set-project', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project: name, create: true })
    });
    const d = await r.json();
    if (r.ok) {
      window.location.href = '/';
    } else {
      projMsg.textContent = d.hint || d.error || 'Error';
      projMsg.className = 'msg err';
    }
  } catch (err) {
    projMsg.textContent = 'Network error';
    projMsg.className = 'msg err';
  }
});

// If redirected back here with ?step=project (session has auth but no project)
if (new URLSearchParams(location.search).get('step') === 'project') {
  fetch('/api/projects')
    .then(r => r.json())
    .then(d => showProjectStep(d.projects))
    .catch(() => {});
}
</script>
</body>
</html>
